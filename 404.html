<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Сторінку не знайдено | Lolanceizi</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <meta name="theme-color" content="#b8ff43">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#070b08;color:#eef4ef;font-family:Inter,Arial,sans-serif;text-align:center;padding:24px}
    .container{max-width:480px}
    h1{font-size:6rem;font-weight:900;color:#b8ff43;line-height:1}
    h2{font-size:1.5rem;margin:12px 0 8px;font-weight:600}
    p{color:#8fa098;margin-bottom:24px;line-height:1.6}
    a{display:inline-block;padding:12px 32px;background:#b8ff43;color:#070b08;font-weight:700;text-decoration:none;border-radius:10px;transition:opacity .2s}
    a:hover{opacity:.85}
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Сторінку не знайдено</h2>
    <p>Такої сторінки не існує або вона була видалена. Перевірте URL або поверніться на головну.</p>
    <a href="/">На головну</a>
  </div>
</body>
</html>
