<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark light">
  <meta name="description" content="LOLance — преміум платформа для мікрозадач">
  <meta name="keywords" content="LOLance, micro-tasks, freelance, crypto, earn money">
  <meta name="author" content="LOLance">
  <!-- Open Graph -->
  <meta property="og:title" content="LOLance — Premium Micro-Task Platform">
  <meta property="og:description" content="Complete engaging tasks, grow and earn while connecting with a global community.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/lolance-logo.svg">
  <meta property="og:locale" content="uk_UA">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="LOLance — Premium Micro-Task Platform">
  <meta name="twitter:description" content="Complete engaging tasks, grow and earn while connecting with a global community.">
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#b8ff43">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LOLance">
  <title>LOLance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Skip link for accessibility -->
  <a href="#main-content" class="skip-link">Перейти до змісту</a>

  <!-- Background layers -->
  <div class="bg-orbs"  aria-hidden="true"></div>
  <div class="bg-grid"  aria-hidden="true"></div>

  <!-- App shell -->
  <div id="app" role="main"></div>

  <!-- Overlays -->
  <div id="modalRoot"  role="dialog" aria-modal="true" aria-hidden="true"></div>
  <div id="toastRoot"  class="toast-wrap" aria-live="polite" aria-atomic="true"></div>
  <div id="notifPanel" class="notif-panel" aria-hidden="true"></div>

  <!-- Scroll progress -->
  <div class="scroll-progress" aria-hidden="true"><span id="scrollBar"></span></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
